name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_real_studio:
        description: 'Run real-project Sanity Studio E2E'
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Turbo affected base
        if: github.event_name == 'pull_request'
        run: echo "TURBO_SCM_BASE=origin/${GITHUB_BASE_REF}" >> "$GITHUB_ENV"

      # Connect your workspace on nx.app and uncomment this to enable task distribution.
      # The "--stop-agents-after" is optional, but allows idle agents to shut down once the "build" targets have been requested
      # - run: npx nx-cloud start-ci-run --distribute-on="5 linux-medium-js" --stop-agents-after="build"

      # Install pnpm
      - uses: pnpm/action-setup@v6

      # Cache node_modules
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install

      - run: pnpm turbo run build test --affected

  sanity-compat-eligibility:
    runs-on: ubuntu-latest
    outputs:
      reason: ${{ steps.sanity-compat-eligibility.outputs.reason }}
      run: ${{ steps.sanity-compat-eligibility.outputs.run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install

      - run: pnpm turbo run test --filter=@limitless-angular/angular-compat

      - name: Check affected Sanity compatibility
        id: sanity-compat-eligibility
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pnpm turbo run compat:affected --filter=@limitless-angular/angular-compat -- --force --github-output "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          else
            base_ref="${{ github.event.before }}"
          fi

          pnpm turbo run compat:affected --filter=@limitless-angular/angular-compat -- --base-ref "$base_ref" --github-output "$GITHUB_OUTPUT"

  sanity-compat-pack:
    needs: sanity-compat-eligibility
    if: needs.sanity-compat-eligibility.outputs.run == 'true'
    runs-on: ubuntu-latest
    outputs:
      version_sets: ${{ steps.compat-matrix.outputs.version_sets }}
      canary_version_sets: ${{ steps.compat-canary-matrix.outputs.canary_version_sets }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install

      - run: pnpm turbo run compat:assert --filter=@limitless-angular/angular-compat

      - run: pnpm turbo run compat:release-parity --filter=@limitless-angular/angular-compat

      - name: Resolve Angular consumer matrix
        id: compat-matrix
        run: echo "version_sets=$(pnpm --filter=@limitless-angular/angular-compat run --silent compat:matrix)" >> "$GITHUB_OUTPUT"

      - name: Resolve Angular canary matrix
        id: compat-canary-matrix
        run: echo "canary_version_sets=$(pnpm --filter=@limitless-angular/angular-compat run --silent compat:matrix --canary)" >> "$GITHUB_OUTPUT"

      - run: pnpm turbo run compat:pack --filter=@limitless-angular/angular-compat

      - run: pnpm turbo run compat:artifact --filter=@limitless-angular/angular-compat

      - uses: actions/upload-artifact@v7
        with:
          name: sanity-compat-package
          path: .compat/artifacts/*.tgz
          if-no-files-found: error

  sanity-compat-consumer:
    needs: sanity-compat-pack
    if: needs.sanity-compat-pack.result == 'success'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        version_set: ${{ fromJson(needs.sanity-compat-pack.outputs.version_sets) }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install

      - uses: actions/download-artifact@v8
        with:
          name: sanity-compat-package
          path: .compat/artifacts

      - run: pnpm --dir tools/angular-compat exec playwright install --with-deps chromium

      - run: pnpm turbo run compat:test --filter=@limitless-angular/angular-compat -- --set ${{ matrix.version_set.id }}

  sanity-compat-canary:
    needs: sanity-compat-pack
    if: needs.sanity-compat-pack.result == 'success'
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        version_set: ${{ fromJson(needs.sanity-compat-pack.outputs.canary_version_sets) }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install

      - uses: actions/download-artifact@v8
        with:
          name: sanity-compat-package
          path: .compat/artifacts

      - run: pnpm --dir tools/angular-compat exec playwright install --with-deps chromium

      - name: Test Angular canary compatibility
        id: canary
        shell: bash
        env:
          VERSION_SET_JSON: ${{ toJson(matrix.version_set) }}
        run: |
          mkdir -p .compat/canary
          log_path=".compat/canary/${{ matrix.version_set.id }}.log"
          metadata_path=".compat/canary/${{ matrix.version_set.id }}-metadata.json"
          status_path=".compat/canary/${{ matrix.version_set.id }}.json"

          set +e
          pnpm turbo run compat:test --filter=@limitless-angular/angular-compat -- --set "${{ matrix.version_set.id }}" --metadata-out "$metadata_path" 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          set -e

          pnpm turbo run compat:canary-status --filter=@limitless-angular/angular-compat -- \
            --version-set-json "$VERSION_SET_JSON" \
            --exit-code "$status" \
            --log "$log_path" \
            --metadata "$metadata_path" \
            --out "$status_path"

          if [ "$status" -eq 0 ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v7
        if: always() && steps.canary.outputs.status != ''
        with:
          name: angular-canary-status-${{ matrix.version_set.id }}
          path: |
            .compat/canary/${{ matrix.version_set.id }}.json
            .compat/canary/${{ matrix.version_set.id }}.log
          if-no-files-found: error

  sanity-compat-canary-report:
    needs: sanity-compat-canary
    if: always() && github.event_name == 'pull_request' && needs.sanity-compat-canary.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        id: download-canary-status
        continue-on-error: true
        with:
          pattern: angular-canary-status-*
          path: .compat/canary-status
          merge-multiple: true

      - name: Publish Angular canary advisory
        uses: actions/github-script@v9
        env:
          STATUS_DIR: .compat/canary-status
          DOWNLOAD_OUTCOME: ${{ steps.download-canary-status.outcome }}
        with:
          script: |
            const { publishCanaryReportForGitHubScript } = await import(
              `${process.cwd()}/tools/angular-compat/canary-report.mjs`,
            );

            await publishCanaryReportForGitHubScript({
              context,
              core,
              downloadOutcome: process.env.DOWNLOAD_OUTCOME,
              github,
              statusDir: process.env.STATUS_DIR,
            });

  presentation-e2e:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - run: pnpm install

      - name: Check affected Sanity Presentation E2E
        id: affected-presentation-e2e
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          else
            base_ref="${{ github.event.before }}"
          fi

          if [ -z "$base_ref" ] || ! git cat-file -e "$base_ref^{commit}" 2>/dev/null; then
            base_ref="origin/main"
          fi

          changed_files="$(git diff --name-only "$base_ref" HEAD)"
          matched_paths="$(printf '%s\n' "$changed_files" | grep -E '^(\.github/workflows/ci\.yml|angular\.json|turbo\.json|package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|tsconfig\.base\.json|eslint\.config\.js|apps/(analog-sanity-blog-example|sanity-presentation-e2e|sanity-presentation-e2e-studio)/|packages/sanity/)' || true)"

          echo "Changed files since $base_ref:"
          printf '%s\n' "$changed_files"

          if [ -n "$matched_paths" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Sanity Presentation E2E is affected by paths:"
            printf '%s\n' "$matched_paths"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Sanity Presentation E2E because no related paths are affected."
          fi

      - name: Install Playwright browser
        if: ${{ steps.affected-presentation-e2e.outputs.run == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run_real_studio) }}
        run: pnpm --dir apps/sanity-presentation-e2e exec playwright install --with-deps chromium

      - name: Run Sanity Presentation protocol E2E
        if: steps.affected-presentation-e2e.outputs.run == 'true'
        run: pnpm turbo run e2e --filter=sanity-presentation-e2e

      - name: Stop Sanity Presentation E2E servers
        if: always() && steps.affected-presentation-e2e.outputs.run == 'true'
        run: fuser -k 4200/tcp 3333/tcp || true

      - name: Run hermetic Sanity Studio E2E
        if: steps.affected-presentation-e2e.outputs.run == 'true'
        run: pnpm turbo run e2e-studio --filter=sanity-presentation-e2e

      - name: Stop hermetic Sanity Studio E2E servers
        if: always() && steps.affected-presentation-e2e.outputs.run == 'true'
        run: fuser -k 4200/tcp 3333/tcp || true

      - name: Prepare real-project Sanity Studio E2E
        if: ${{ (steps.affected-presentation-e2e.outputs.run == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.run_real_studio) }}
        env:
          SANITY_E2E_PROJECT_ID: ${{ secrets.SANITY_E2E_PROJECT_ID }}
          SANITY_E2E_DATASET: ${{ secrets.SANITY_E2E_DATASET }}
          SANITY_E2E_READ_TOKEN: ${{ secrets.SANITY_E2E_READ_TOKEN }}
          SANITY_E2E_WRITE_TOKEN: ${{ secrets.SANITY_E2E_WRITE_TOKEN }}
          SANITY_E2E_BYPASS_TOKEN: ${{ secrets.SANITY_E2E_BYPASS_TOKEN }}
          SANITY_E2E_STORAGE_STATE_JSON: ${{ secrets.SANITY_E2E_STORAGE_STATE_JSON }}
        run: |
          missing=0
          for name in SANITY_E2E_PROJECT_ID SANITY_E2E_DATASET SANITY_E2E_READ_TOKEN SANITY_E2E_BYPASS_TOKEN SANITY_E2E_STORAGE_STATE_JSON; do
            if [ -z "${!name}" ]; then
              echo "::notice::Skipping real-project Studio E2E because $name is not configured."
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "RUN_REAL_STUDIO_E2E=false" >> "$GITHUB_ENV"
            exit 0
          fi

          mkdir -p apps/sanity-presentation-e2e/.auth
          printf '%s' "$SANITY_E2E_STORAGE_STATE_JSON" > apps/sanity-presentation-e2e/.auth/sanity-storage-state.json

          {
            echo "RUN_REAL_STUDIO_E2E=true"
            echo "VITE_SANITY_PROJECT_ID=$SANITY_E2E_PROJECT_ID"
            echo "VITE_SANITY_DATASET=$SANITY_E2E_DATASET"
            echo "SANITY_API_READ_TOKEN=$SANITY_E2E_READ_TOKEN"
            echo "BYPASS_TOKEN=$SANITY_E2E_BYPASS_TOKEN"
            echo "SANITY_E2E_STORAGE_STATE=apps/sanity-presentation-e2e/.auth/sanity-storage-state.json"
          } >> "$GITHUB_ENV"

          if [ -n "$SANITY_E2E_WRITE_TOKEN" ]; then
            {
              echo "SANITY_API_WRITE_TOKEN=$SANITY_E2E_WRITE_TOKEN"
              echo "SEED_REAL_STUDIO_E2E=true"
            } >> "$GITHUB_ENV"
          else
            echo "SEED_REAL_STUDIO_E2E=false" >> "$GITHUB_ENV"
          fi

      - name: Seed real-project Sanity smoke document
        if: env.RUN_REAL_STUDIO_E2E == 'true' && env.SEED_REAL_STUDIO_E2E == 'true'
        run: node apps/sanity-presentation-e2e/scripts/sanity-seed-post.mjs

      - name: Run real-project Sanity Studio E2E
        if: env.RUN_REAL_STUDIO_E2E == 'true'
        run: pnpm turbo run e2e-real-studio --filter=sanity-presentation-e2e
