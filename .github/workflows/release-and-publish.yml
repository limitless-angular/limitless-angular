name: Release and Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (optional - will use conventional commits if not specified)'
        required: false
        default: ''
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: false
        type: boolean

env:
  TURBO_TELEMETRY_DISABLED: '1'

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-and-publish:
    if: github.repository == 'limitless-angular/limitless-angular'
    name: Release and Publish to npm
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    environment: npm-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js per package.json
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Verify environment
        run: |
          echo "Node version: $(node -v)"
          echo "pnpm version: $(pnpm -v)"
          echo "Workspace directory: $(pwd)"

      - name: Run tests
        run: pnpm turbo run test

      - name: Check for lint errors
        run: pnpm turbo run lint --filter=@limitless-angular/sanity

      - name: Set up Git user
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Validate and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          RELEASE_VERBOSE: ${{ inputs.verbose }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          ARGS=()
          if [ -n "$RELEASE_VERSION" ]; then
            ARGS+=(--version "$RELEASE_VERSION")
          fi
          if [ "$RELEASE_VERBOSE" = "true" ]; then
            ARGS+=(--verbose)
          fi

          pnpm turbo run release:publish --filter=@limitless-angular/release-tools -- "${ARGS[@]}"

      - name: Generate release summary
        if: always()
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          echo "## Release Process Summary" > "$GITHUB_STEP_SUMMARY"
          echo "- Mode: publish" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version input: ${RELEASE_VERSION:-conventional commits}" >> "$GITHUB_STEP_SUMMARY"
