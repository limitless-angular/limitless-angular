name: Release and Publish

on:
  # Run manually using the GitHub UI
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (optional - will use conventional commits if not specified)'
        required: false
        default: ''
      dryRun:
        description: 'Perform a dry run without publishing'
        required: false
        default: false
        type: boolean
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: false
        type: boolean

env:
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  release-and-publish:
    # prevents this action from running on forks
    if: github.repository == 'limitless-angular/limitless-angular'
    name: Release and Publish to npm
    runs-on: ubuntu-22.04
    permissions:
      contents: write # needed for creating GitHub releases
      id-token: write # needed for provenance data generation
    outputs:
      release_successful: ${{ steps.release.outcome == 'success' }}
      build_successful: ${{ steps.build.outcome == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # include tags

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Install Node.js per package.json
        uses: actions/setup-node@v4
        with:
          # Use the .nvmrc file as the source of truth
          node-version-file: .nvmrc
          cache: 'pnpm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Verify environment
        run: |
          echo "Node version: $(node -v)"
          echo "pnpm version: $(pnpm -v)"
          echo "Workspace directory: $(pwd)"

      - name: Run tests
        run: pnpm turbo run test

      - name: Check for lint errors
        run: pnpm turbo run lint --filter=@limitless-angular/sanity

      - name: Check release compatibility pipeline
        run: pnpm run compat:release-parity

      - name: Set up Git user
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Execute release process
        id: release
        run: |
          # Show dry run status clearly
          if [ "${{ inputs.dryRun }}" == "true" ]; then
            echo "::notice::Running in DRY RUN mode - no actual changes will be made"
          fi

          # Prepare version argument if specified
          VERSION_ARG="${{ inputs.version != '' && format('--version={0}', inputs.version) || '' }}"

          # Prepare dry run argument
          DRY_RUN_ARG="${{ inputs.dryRun && '--dryRun=true' || '--dryRun=false' }}"

          # Prepare verbose argument
          VERBOSE_ARG="${{ inputs.verbose && '--verbose=true' || '' }}"

          # Run the release script and capture its output
          RELEASE_OUTPUT=$(pnpm tsx tools/scripts/release.ts $VERSION_ARG $DRY_RUN_ARG $VERBOSE_ARG)

          # Extract the released version from the script output
          RELEASED_VERSION=$(echo "$RELEASE_OUTPUT" | grep "RELEASED_VERSION=" | cut -d'=' -f2)

          # If we got a version, save it as an environment variable
          if [ -n "$RELEASED_VERSION" ]; then
            echo "RELEASED_VERSION=$RELEASED_VERSION" >> $GITHUB_ENV
            echo "Release version detected: $RELEASED_VERSION"
          else
            echo "::error::Failed to extract released version from script output"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Only proceed with building if release was successful
      - name: Pack sanity project
        id: build
        if: steps.release.outcome == 'success'
        run: pnpm run compat:pack

      - name: Validate packed artifact shape
        if: steps.build.outcome == 'success'
        run: pnpm run compat:artifact

      - name: Install Playwright browser
        if: steps.build.outcome == 'success'
        run: pnpm --dir apps/sanity-presentation-e2e exec playwright install --with-deps chromium

      - name: Test packed artifact compatibility
        if: steps.build.outcome == 'success'
        run: pnpm run compat:test

      # Validate build artifacts
      - name: Validate build artifacts
        if: steps.build.outcome == 'success'
        run: |
          TARBALL_COUNT=$(find .compat/artifacts -maxdepth 1 -name '*.tgz' | wc -l | tr -d ' ')
          if [ "$TARBALL_COUNT" != "1" ]; then
            echo "::error::Expected one packed artifact in .compat/artifacts, found $TARBALL_COUNT"
            exit 1
          fi

          TARBALL=$(find .compat/artifacts -maxdepth 1 -name '*.tgz' | head -n 1)
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          ARTIFACT_VERSION=$(tar -xOf "$TARBALL" package/package.json | jq -r '.version')
          EXPECTED_VERSION="${{ env.RELEASED_VERSION }}"
          if [ "${{ inputs.dryRun }}" = "true" ]; then
            EXPECTED_VERSION=$(jq -r '.version' packages/sanity/package.json)
          fi

          echo "Packed package version: $ARTIFACT_VERSION"
          echo "Expected package version: $EXPECTED_VERSION"

          if [ "$ARTIFACT_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Version mismatch! Package version ($ARTIFACT_VERSION) doesn't match expected version ($EXPECTED_VERSION)"
            exit 1
          fi

          echo "Packed artifact validated successfully"

      # Publish packages to npm if all previous steps succeeded and not a dry run
      - name: Publish packages to npm
        id: publish
        if: ${{ !inputs.dryRun && steps.release.outcome == 'success' && steps.build.outcome == 'success' }}
        run: npm publish "$TARBALL" --access public --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      # Create a summary of the release
      - name: Generate release summary
        if: always()
        run: |
          echo "## Release Process Summary" > $GITHUB_STEP_SUMMARY
          echo "- Release step: ${{ steps.release.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build step: ${{ steps.build.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Publish step: ${{ steps.publish.outcome || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Released version: ${{ env.RELEASED_VERSION || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
